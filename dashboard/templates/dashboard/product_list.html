{% extends 'base.html' %}
{% block content %}
<h1>Products</h1>
<a href="{% url 'dashboard_add_product' %}" class="btn btn-primary mb-3">Add Product</a>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Sale Price</th>
        </tr>
    </thead>
    <tbody>
        {% for product in products %}
        <tr>
            <td>{{ product.name }}</td>
            <td>{{ product.category.name }}</td>
            <td>{{ product.price }}</td>
            <td>{{ product.sale_price }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
