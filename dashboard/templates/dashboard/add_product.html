{% extends 'base.html' %}
{% block content %}
<h1>Add Product</h1>

<form method="post" enctype="multipart/form-data" id="productForm">
    {% csrf_token %}
    <h4>Product Details</h4>
    {{ product_form.as_p }}

    <h4>Variations</h4>
    <div id="variations">
        {{ variation_formset.management_form }}
        {% for form in variation_formset %}
        <div class="variation-form border p-2 mb-2">
            <label>Variation Name:</label>
            {{ form.name }}
            <button type="button" class="btn btn-danger btn-sm remove-variation">Remove Variation</button>

            <!-- Container for options -->
            <div class="options-container mt-2">
                <button type="button" class="btn btn-secondary btn-sm add-option">Add Option</button>
            </div>
        </div>
        {% endfor %}
    </div>

    <button type="button" class="btn btn-primary mb-2" id="addVariation">Add Variation</button>
    <br>
    <button type="submit" class="btn btn-success">Save Product</button>
</form>

<script>
let variationIndex = {{ variation_formset.total_form_count|default:0 }};
const variationsDiv = document.getElementById('variations');

document.getElementById('addVariation').addEventListener('click', function() {
    const newVariation = document.createElement('div');
    newVariation.classList.add('variation-form', 'border', 'p-2', 'mb-2');
    newVariation.innerHTML = `
        <label>Variation Name:</label>
        <input type="text" name="variation-${variationIndex}-name" required />
        <button type="button" class="btn btn-danger btn-sm remove-variation">Remove Variation</button>
        <div class="options-container mt-2">
            <button type="button" class="btn btn-secondary btn-sm add-option">Add Option</button>
        </div>
    `;
    variationsDiv.appendChild(newVariation);
    variationIndex++;
    updateManagementForm();
});

// Remove Variation
variationsDiv.addEventListener('click', function(e) {
    if(e.target.classList.contains('remove-variation')){
        e.target.closest('.variation-form').remove();
        updateManagementForm();
    }
});

// Add Option
variationsDiv.addEventListener('click', function(e){
    if(e.target.classList.contains('add-option')){
        const optionsContainer = e.target.closest('.options-container');
        const optionIndex = optionsContainer.querySelectorAll('.option').length;
        const newOption = document.createElement('div');
        newOption.classList.add('option', 'mb-1');
        newOption.innerHTML = `
            <input type="text" name="option-name" placeholder="Option Name" required />
            <input type="number" step="0.01" name="option-price" placeholder="Price Modifier" />
            <button type="button" class="btn btn-danger btn-sm remove-option">Remove Option</button>
        `;
        optionsContainer.insertBefore(newOption, e.target);
    }
});

// Remove Option
variationsDiv.addEventListener('click', function(e){
    if(e.target.classList.contains('remove-option')){
        e.target.closest('.option').remove();
    }
});

// Update Django management form total_forms
function updateManagementForm(){
    const totalForms = document.querySelector('#id_form-TOTAL_FORMS');
    if(totalForms){
        totalForms.value = document.querySelectorAll('.variation-form').length;
    }
}
</script>

{% endblock %}
